                {name:"ADP-K.2H2O", cas:"58-64-0", group:"Molecular biology reagents", app:"Kinase cofactor, energy substrate"},
                {name:"Beta-NADH", cas:"606-68-8", group:"Molecular biology reagents", app:"Dehydrogenase cofactor"},
                {name:"ɑ -Ketoglutaric acid.2Na", cas:"305-72-6", group:"Molecular biology reagents", app:"Metabolite, transaminase cofactor"},
                {name:"Glycine", cas:"56-40-6", group:"Molecular biology reagents", app:"Buffer component, capillary electrophoresis"},
                {name:"L-Alanine", cas:"56-41-7", group:"Molecular biology reagents", app:"Culture medium component, amino acid standard"},
                {name:"L-Aspartic acid", cas:"56-84-8", group:"Molecular biology reagents", app:"Buffer component, mild chelator"},
                {name:"D - mannitol", cas:"69-65-8", group:"Molecular biology reagents", app:"Osmotic agent, excipient"},
                {name:"D-Glucose", cas:"50-99-7", group:"Molecular biology reagents", app:"Enzyme substrate, osmolyte"},
                {name:"Succinic acid", cas:"110-15-6", group:"Molecular biology reagents", app:"Buffer component"},
                {name:"L-Aspartic acid sodium salt.Monohydrate", cas:"323194-76-7", group:"Molecular biology reagents", app:"Salt of aspartic acid"},
                {name:"BSA", cas:"9048-46-8", group:"Molecular biology reagents", app:"Protein stabilizer, blocking agent in ELISA, PCR enhancer"},
                {name:"Dextran sulfate sodium salt", cas:"9011-18-1", group:"Molecular biology reagents", app:"Anticoagulant, lipoprotein precipitant, DNA hybridization"},
                {name:"DS-500", cas:"9011-18-1", group:"Molecular biology reagents", app:"Dextran sulfate, same as above"},
                {name:"Adenosine-5-monophosphoric acid", cas:"18422-05-4", group:"Molecular biology reagents", app:"Cofactor, metabolite"},
                {name:"6 - Aminocaproic acid", cas:"60-32-2", group:"Molecular biology reagents", app:"Protease inhibitor"},
                // Preservatives (8)
                {name:"Thimerosal", cas:"54-64-8", group:"Preservatives", app:"Antiseptic, preservative (vaccines, reagents)"},
                {name:"Bronidox-L", cas:"30007-47-7", group:"Preservatives", app:"Preservative for diagnostic kits"},
                {name:"P300 preservative", cas:"", group:"Preservatives", app:"Stabilizer, preservative"},
                {name:"4-Hydroxbenzoic acid", cas:"99-96-7", group:"Preservatives", app:"Paraben synthesis, preservative"},
                {name:"Methyl ether of para-hydroxybenzoic acid", cas:"99-76-3", group:"Preservatives", app:"Preservative (methylparaben)"},
                {name:"Ethyl ether of para-hydroxybenzoic acid", cas:"120-47-8", group:"Preservatives", app:"Preservative (ethylparaben)"},
                {name:"Sodium-omadine (2-mercaptopyridine-1-oxide sodium salt)", cas:"3811-73-2", group:"Preservatives", app:"Biocide, preservative"},
                {name:"Sodium Azide", cas:"26628-22-8", group:"Preservatives", app:"Preservative, bacteriostatic agent"},
                // Other (chemicals, solvents, intermediates) – 10 позиций
                {name:"2 - chloroacetamide", cas:"79-07-2", group:"Other", app:"Chemical reagent, intermediate"},
                {name:"2,4 - dichloraniline", cas:"554-00-7", group:"Other", app:"Chemical intermediate"},
                {name:"2,4,6 - tribromo-3-hydroxy-benzoic acid", cas:"14348-40-4", group:"Other", app:"Chemical intermediate"},
                {name:"3-methoxy-3-methyl-1-butanol", cas:"56539-66-3", group:"Other", app:"Solvent"},
                {name:"Monoethyl ether of diethylene glycol", cas:"111-90-0", group:"Other", app:"Solvent"},
                {name:"Dipropylene Glycol methyl ether", cas:"34590-94-8", group:"Other", app:"Solvent"},
                {name:"Tripropylene Glycol methyl ether", cas:"25498-49-1", group:"Other", app:"Solvent"},
                {name:"1-Heptanol", cas:"111-70-60", group:"Other", app:"Solvent"},
                {name:"Diethylamine", cas:"109-89-7", group:"Other", app:"Organic base, chemical intermediate"},
                {name:"2-oxo-Pentanedioic acid", cas:"328-50-7", group:"Other", app:"Metabolite"}
            ];
            
            const groupOrder = ["Biological buffers", "Salts & inorganics", "Detergents & surfactants", "Substrates & chromogens", "Chelators & reducing agents", "Molecular biology reagents", "Preservatives", "Other"];
            
            function sortByName(arr) {
                return arr.slice().sort((a,b) => {
                    let aName = a.name.toLowerCase(), bName = b.name.toLowerCase();
                    let aIsDigit = /^\d/.test(aName), bIsDigit = /^\d/.test(bName);
                    if (aIsDigit !== bIsDigit) return aIsDigit ? -1 : 1;
                    return aName < bName ? -1 : aName > bName ? 1 : 0;
                });
            }
            
            let currentTooltip = null; // текущая открытая подсказка
            
            function closeCurrentTooltip() {
                if (currentTooltip) {
                    currentTooltip.remove();
                    currentTooltip = null;
                }
            }
            
            function attachProductClick() {
                const productCells = document.querySelectorAll('.substances-table .product-name');
                productCells.forEach(cell => {
                    // удаляем старый обработчик, если был
                    if (cell._clickHandler) cell.removeEventListener('click', cell._clickHandler);
                    const handler = (e) => {
                        e.stopPropagation();
                        const appText = cell.getAttribute('data-app');
                        if (!appText || appText === "") return;
                        const row = cell.closest('tr');
                        const casCell = row.querySelector('.cas');
                        if (!casCell) return;
                        // если эта же подсказка уже открыта – закрываем её
                        if (currentTooltip && currentTooltip.parentNode === casCell) {
                            closeCurrentTooltip();
                            return;
                        }
                        // закрываем любую другую открытую подсказку
                        closeCurrentTooltip();
                        // создаём новую
                        const tooltip = document.createElement('div');
                        tooltip.className = 'tooltip-overlay';
                        tooltip.innerText = appText;
                        casCell.style.position = 'relative';
                        casCell.appendChild(tooltip);
                        currentTooltip = tooltip;
                    };
                    cell.addEventListener('click', handler);
                    cell._clickHandler = handler;
                });
            }
            
            function renderTables(searchTerm = "") {
                const term = searchTerm.trim().toLowerCase();
                const termNoDash = term.replace(/-/g, '');
                const container = document.getElementById('tablesContainer');
                if (!container) return;
                let html = "";
                for (let group of groupOrder) {
                    let items = fullData.filter(i => i.group === group);
                    if (term) {
                        items = items.filter(i => i.name.toLowerCase().includes(term) || i.cas.toLowerCase().includes(term) || i.cas.replace(/-/g, '').includes(termNoDash));
                    }
                    if (items.length === 0) continue;
                    items = sortByName(items);
                    html += `<div class="category-section"><div class="category-title">${group}</div><div class="result-count">Found: ${items.length}</div>`;
                    html += `<div class="table-wrapper"><table class="substances-table"><thead><tr><th>#</th><th>Product Name</th><th>CAS</th></tr></thead><tbody>`;
                    items.forEach((item, idx) => {
                        let casDisplay = item.cas && item.cas.trim() !== "" ? item.cas : "—";
                        html += `<tr>`;
                        html += `<td>${idx+1}</td>`;
                        html += `<td class="product-name" data-app="${escapeAttr(item.app)}">${escapeHtml(item.name)}</td>`;
                        html += `<td class="cas"><span class="cas-value">${escapeHtml(casDisplay)}</span></td>`;
                        html += `</tr>`;
                    });
                    html += `</tbody></table></div></div>`;
                }
                if (html === "") html = `<div class="no-results">No substances match your search.</div>`;
                container.innerHTML = html;
                attachProductClick();
            }
            
            function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
            function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
            
            // Глобальный клик по документу – закрывать подсказку при клике вне названия продукта
            document.body.addEventListener('click', (e) => {
                if (!currentTooltip) return;
                // если клик не по элементу с классом .product-name и не внутри него
                if (!e.target.closest('.product-name')) {
                    closeCurrentTooltip();
                }
            });
            
            const searchInput = document.getElementById('searchInput'), clearBtn = document.getElementById('clearSearch');
            if(searchInput) searchInput.addEventListener('input', () => { renderTables(searchInput.value); if(clearBtn) clearBtn.style.display = searchInput.value ? 'block' : 'none'; });
            if(clearBtn) clearBtn.addEventListener('click', () => { searchInput.value = ''; renderTables(''); clearBtn.style.display = 'none'; });
            renderTables('');
            
            // Бургер
            const burgerBtn = document.getElementById('burgerBtn'), menuPanel = document.getElementById('menuPanel'), closeMenuBtn = document.getElementById('closeMenuBtn');
            if(burgerBtn) burgerBtn.addEventListener('click', () => menuPanel.classList.add('open'));
            if(closeMenuBtn) closeMenuBtn.addEventListener('click', () => menuPanel.classList.remove('open'));
            document.addEventListener('click', (e) => { if(menuPanel && menuPanel.classList.contains('open') && !menuPanel.contains(e.target) && !burgerBtn.contains(e.target)) menuPanel.classList.remove('open'); });
            
            // Форма
            const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxA5MueC0RXAhrR5oR74pDP3iM5CrNIPr_vtYydxyqm5mgz-RRuGEHgmVHRxphBW40rvA/exec';
            const modal = document.getElementById('contactModal'), inquireBtn = document.getElementById('inquireBtnSub'), closeModalBtn = document.getElementById('closeModalBtn'), form = document.getElementById('contactForm'), statusDiv = document.getElementById('formStatus');
            function openModal() { modal.style.display = 'flex'; statusDiv.innerHTML = ''; }
            function closeModalFunc() { modal.style.display = 'none'; form.reset(); statusDiv.innerHTML = ''; }
            if(inquireBtn) inquireBtn.addEventListener('click', openModal);
            if(closeModalBtn) closeModalBtn.addEventListener('click', closeModalFunc);
            window.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });
            if(form) form.addEventListener('submit', async (e) => {
                e.preventDefault();
                let name = document.getElementById('name').value.trim(), company = document.getElementById('company').value.trim(), email = document.getElementById('email').value.trim(), message = document.getElementById('message').value.trim();
                if (!name || !company || !email || !message) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Please fill in all fields.</span>'; return; }
                if (!email.includes('@')) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Invalid email.</span>'; return; }
                const submitBtn = form.querySelector('.modal-submit');
                submitBtn.disabled = true; submitBtn.textContent = 'Sending...'; statusDiv.innerHTML = 'Sending...';
                try { await fetch(PROXY_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, company, email, message }) });
                    statusDiv.innerHTML = '<span style="color:#2e7d32;">✓ Thank you! We will get back to you soon.</span>'; form.reset(); setTimeout(closeModalFunc, 2000);
                } catch(err) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Error, please try again later.</span>'; }
                finally { submitBtn.disabled = false; submitBtn.textContent = 'Send inquiry'; }
            });
        })();
    </script>
</body>
</html>
