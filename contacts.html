<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="google-site-verification" content="YpMP4dTa_saKHs8a1q1fMdOtfzj5GV8rBcc4ooTbNo8" />
    <title>Contacts | GPL Diagnostics – get in touch</title>
    <meta name="description" content="Contact GPL Diagnostics for IVD technology transfer, reagents, components, antibodies, antigens, market analysis and software development.">
    <meta name="keywords" content="GPL Diagnostics, contact, IVD, technology transfer, reagents, antibodies, antigens, market analysis, software development">
    <meta name="author" content="GPL Diagnostics">
    <meta property="og:title" content="Contacts | GPL Diagnostics – get in touch">
    <meta property="og:description" content="Reach out to GPL Diagnostics for IVD technology transfer, reagents, components, antibodies, antigens, market analysis and software development.">
    <meta property="og:image" content="images/hero.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #2c2c2c; line-height: 1.5; }
        .hero-image, .bottom-image { width: 100%; display: block; }
        
        .burger { position: fixed; top: 32px; right: 32px; z-index: 1000; }
        .burger-btn { background: rgba(0,16,28,0.7); backdrop-filter: blur(8px); border: none; border-radius: 40px; width: 52px; height: 52px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; cursor: pointer; }
        .burger-btn span { width: 24px; height: 2px; background: white; border-radius: 4px; }
        .menu-panel { position: fixed; top: 0; right: -420px; width: 380px; max-width: 85vw; height: 100%; background: rgba(10,15,26,0.96); backdrop-filter: blur(16px); border-left: 1px solid rgba(255,255,255,0.2); z-index: 1100; transition: right 0.4s; padding: 40px 28px; overflow-y: auto; }
        .menu-panel.open { right: 0; }
        .menu-panel .main-cat { font-size: 1.4rem; font-weight: 600; color: white; margin-bottom: 12px; border-left: 3px solid #00101c; padding-left: 14px; }
        .sub-list { list-style: none; padding-left: 20px; }
        .sub-list li { margin: 12px 0; }
        .sub-list a { text-decoration: none; font-size: 1rem; color: #e0e4f0; transition: 0.2s; display: inline-block; }
        .sub-list a:hover { color: white; transform: translateX(4px); }
        .close-menu { background: none; border: none; color: white; font-size: 28px; cursor: pointer; position: absolute; top: 24px; left: 24px; }
        
        .content { max-width: 700px; margin: 0 auto; padding: 60px 24px; }
        .content h1 { color: #00101c; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; text-align: center; }
        .content .subhead { text-align: center; font-size: 1.1rem; color: #4a4a4a; max-width: 500px; margin: 0 auto 40px; }
        
        .email-block { text-align: center; margin-bottom: 40px; }
        .email-block .icon { font-size: 1.4rem; display: block; margin-bottom: 6px; }
        .email-block a { font-size: 1.3rem; font-weight: 500; color: #00101c; text-decoration: none; border-bottom: 2px solid transparent; transition: 0.2s; }
        .email-block a:hover { border-bottom-color: #00101c; }
        
        .contact-form { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 20px; padding: 36px 32px; }
        .contact-form label { display: block; margin-top: 16px; margin-bottom: 6px; font-weight: 500; color: #1f1f1f; font-size: 0.9rem; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 16px; font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: 0.2s; }
        .contact-form input:focus, .contact-form textarea:focus { outline: none; border-color: #00101c; }
        .contact-form textarea { min-height: 130px; resize: vertical; }
        .contact-form .btn-submit { background-color: #00101c; color: white; border: none; padding: 14px 32px; border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.25s; margin-top: 24px; width: 100%; }
        .contact-form .btn-submit:hover { background-color: #002a3b; }
        .form-status { margin-top: 16px; font-size: 0.9rem; text-align: center; }
        
        .footer { width: 100%; margin: 0; padding: 0; line-height: 0; }
        .footer img { width: 100%; display: block; }
        
        @media (max-width: 768px) {
            .burger { top: 20px; right: 20px; }
            .burger-btn { width: 44px; height: 44px; }
            .menu-panel { width: 280px; padding: 32px 20px; }
            .content { padding: 40px 20px; }
            .contact-form { padding: 24px 20px; }
            .email-block a { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <img class="hero-image" src="images/hero.png" alt="GPL Diagnostics – contacts">
    
    <!-- Бургер -->
    <div class="burger"><div class="burger-btn" id="burgerBtn"><span></span><span></span><span></span></div></div>
    <div class="menu-panel" id="menuPanel">
        <button class="close-menu" id="closeMenuBtn">✕</button>
        <div style="margin-top: 32px;"></div>
        <div class="menu-section"><div class="main-cat">Mission</div><a href="about.html" style="margin-left: 18px; color:#e0e4f0;">About GPL →</a></div>
        <div class="menu-section"><div class="main-cat">Products</div><ul class="sub-list"><li><a href="sub.html">Substances</a></li><li><a href="comp.html">Components</a></li><li><a href="ab.html">Antibodies</a></li><li><a href="ag.html">Antigens</a></li></ul></div>
        <div class="menu-section"><div class="main-cat">Services</div><ul class="sub-list"><li><a href="serv.html">IVD Market Survey</a></li><li><a href="opt.html">IVD Web Optimisation</a></li><li><a href="soft.html">IVD Software Development</a></li></ul></div>
        <div class="menu-section"><div class="main-cat">Contacts</div><a href="contacts.html" style="margin-left: 18px; color:#e0e4f0;">Get in touch →</a></div>
    </div>
    
    <div class="content">
        <h1>Contacts</h1>
        <p class="subhead">Have a question or a project? Reach out — we are here to help.</p>
        
        <div class="email-block">
            <span class="icon">✉️</span>
            <a href="mailto:info@gpl-diagnostics.com">info@gpl-diagnostics.com</a>
        </div>
        
        <div class="contact-form">
            <form id="contactForm">
                <label for="name">Full name *</label>
                <input type="text" id="name" name="name" required>
                
                <label for="company">Company *</label>
                <input type="text" id="company" name="company" required>
                
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Your message *</label>
                <textarea id="message" name="message" required></textarea>
                
                <button type="submit" class="btn-submit">Send inquiry</button>
                <div id="formStatus" class="form-status"></div>
            </form>
        </div>
    </div>
    
    <div class="footer">
        <img src="images/bottom.png" alt="GPL Diagnostics bottom">
    </div>
    
    <script>
        (function() {
            // Бургер
            const burgerBtn = document.getElementById('burgerBtn');
            const menuPanel = document.getElementById('menuPanel');
            const closeMenuBtn = document.getElementById('closeMenuBtn');
            if (burgerBtn) burgerBtn.addEventListener('click', () => menuPanel.classList.add('open'));
            if (closeMenuBtn) closeMenuBtn.addEventListener('click', () => menuPanel.classList.remove('open'));
            document.addEventListener('click', (e) => { if (menuPanel && menuPanel.classList.contains('open') && !menuPanel.contains(e.target) && !burgerBtn.contains(e.target)) menuPanel.classList.remove('open'); });
            
            // Форма
            const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxA5MueC0RXAhrR5oR74pDP3iM5CrNIPr_vtYydxyqm5mgz-RRuGEHgmVHRxphBW40rvA/exec';
            const form = document.getElementById('contactForm');
            const statusDiv = document.getElementById('formStatus');
            
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const name = document.getElementById('name').value.trim();
                    const company = document.getElementById('company').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const message = document.getElementById('message').value.trim();
                    
                    if (!name || !company || !email || !message) {
                        statusDiv.innerHTML = '<span style="color: #d32f2f;">Please fill in all fields.</span>';
                        return;
                    }
                    if (!email.includes('@')) {
                        statusDiv.innerHTML = '<span style="color: #d32f2f;">Please enter a valid email address.</span>';
                        return;
                    }
                    
                    const submitBtn = form.querySelector('.btn-submit');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Sending...';
                    statusDiv.innerHTML = '<span style="color: #2c2c2c;">Sending...</span>';
                    
                    try {
                        await fetch(PROXY_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name, company, email, message })
                        });
                        statusDiv.innerHTML = '<span style="color: #2e7d32;">✓ Thank you! We will get back to you soon.</span>';
                        form.reset();
                        setTimeout(() => {
                            statusDiv.innerHTML = '';
                        }, 3000);
                    } catch (error) {
                        console.error(error);
                        statusDiv.innerHTML = '<span style="color: #d32f2f;">❌ Something went wrong. Please try again later.</span>';
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Send inquiry';
                    }
                });
            }
        })();
    </script>
</body>
</html>
