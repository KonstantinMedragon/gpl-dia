            let currentTooltip = null;
            
            function closeTooltip() {
                if (currentTooltip) { currentTooltip.remove(); currentTooltip = null; }
            }
            
            function attachClickHandler() {
                document.querySelectorAll('.product-name').forEach(cell => {
                    if (cell._clickHandler) cell.removeEventListener('click', cell._clickHandler);
                    const handler = (e) => {
                        e.stopPropagation();
                        const desc = cell.getAttribute('data-desc');
                        if (!desc) return;
                        const abbrevCell = cell.closest('tr').querySelector('.abbrev-cell');
                        if (!abbrevCell) return;
                        if (currentTooltip && currentTooltip.parentNode === abbrevCell) { closeTooltip(); return; }
                        closeTooltip();
                        const tooltip = document.createElement('div');
                        tooltip.className = 'tooltip-overlay';
                        tooltip.innerText = desc;
                        abbrevCell.style.position = 'relative';
                        abbrevCell.appendChild(tooltip);
                        currentTooltip = tooltip;
                    };
                    cell.addEventListener('click', handler);
                    cell._clickHandler = handler;
                });
            }
            
            function renderTable(searchTerm = "") {
                const term = searchTerm.trim().toLowerCase();
                const filterFn = (item) => item.catalog.toLowerCase().includes(term) || item.name.toLowerCase().includes(term) || item.full.toLowerCase().includes(term);
                
                const container = document.getElementById('tablesContainer');
                if (!container) return;
                
                let html = "";
                let anyFound = false;
                
                for (let cat of categories) {
                    let items = cat.data.filter(filterFn);
                    if (items.length === 0) continue;
                    anyFound = true;
                    html += `<div class="antibodies-section"><div class="category-title">${cat.name}</div><div class="result-count">Found: ${items.length}</div>`;
                    html += `<div class="table-wrapper"><table class="antibodies-table"><thead><tr><th>Catalog #</th><th>Antibody name</th><th>Target / description</th></tr></thead><tbody>`;
                    items.forEach(item => {
                        html += `<tr><td>${escapeHtml(item.catalog)}</td><td class="abbrev-cell">${escapeHtml(item.name)}</td><td class="product-name" data-desc="${escapeAttr(item.desc)}">${escapeHtml(item.full)}</td></tr>`;
                    });
                    html += `</tbody></table></div></div>`;
                }
                
                if (!anyFound) html = `<div class="no-results">No antibodies match your search.</div>`;
                container.innerHTML = html;
                attachClickHandler();
            }
            
            function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
            function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
            
            document.body.addEventListener('click', (e) => { if (currentTooltip && !e.target.closest('.product-name')) closeTooltip(); });

                    statusDiv.innerHTML = '<span style="color:#2e7d32;">✓ Thank you! We will get back to you soon.</span>'; form.reset(); setTimeout(closeModalFunc, 2000);
                } catch(err) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Error, please try again later.</span>'; }
                finally { submitBtn.disabled = false; submitBtn.textContent = 'Send inquiry'; }
            });
        })();
    </script>
</body>
</html>
