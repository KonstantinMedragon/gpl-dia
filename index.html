<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GPL Diagnostics | Trace the unknown</title>
    <!-- Подключение шрифта Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0f1a;
            min-height: 100vh;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Изображение прижато к левому верхнему углу, без искажений */
        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            object-position: top left;
        }

        /* БУРГЕР МЕНЮ (правый верхний угол) */
        .burger {
            position: absolute;
            top: 32px;
            right: 32px;
            z-index: 1000;
        }

        .burger-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            width: 52px;
            height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .burger-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .burger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: white;
            border-radius: 4px;
            transition: all 0.25s ease;
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 380px;
            max-width: 85vw;
            height: 100%;
            background: rgba(10, 15, 26, 0.96);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
            z-index: 1100;
            transition: right 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 40px 28px;
            overflow-y: auto;
            font-weight: 400;
        }
        .menu-panel.open {
            right: 0;
        }

        .menu-panel .menu-section {
            margin-bottom: 32px;
        }
        .menu-panel .main-cat {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: white;
            margin-bottom: 12px;
            border-left: 3px solid #4c9aff;
            padding-left: 14px;
        }
        .sub-list {
            list-style: none;
            padding-left: 20px;
        }
        .sub-list li {
            margin: 12px 0;
        }
        .sub-list a, .menu-panel .menu-section > a {
            text-decoration: none;
            font-size: 1rem;
            font-weight: 450;
            color: #e0e4f0;
            transition: 0.2s;
            display: inline-block;
        }
        .sub-list a:hover, .menu-panel .menu-section > a:hover {
            color: white;
            transform: translateX(4px);
        }
        .simple-link {
            display: inline-block;
            margin-top: 6px;
        }
        hr {
            margin: 20px 0;
            border-color: rgba(255,255,255,0.15);
        }
        .close-menu {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            position: absolute;
            top: 24px;
            left: 24px;
            font-weight: 300;
            opacity: 0.7;
            transition: 0.2s;
        }
        .close-menu:hover {
            opacity: 1;
        }

        /* СЛОГАН В ЛЕВОМ НИЖНЕМ УГЛУ */
        .slogan {
            position: absolute;
            bottom: 48px;
            left: 48px;
            z-index: 100;
            max-width: 560px;
        }
        .slogan h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            color: white;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin: 0;
        }

        @media (max-width: 640px) {
            .burger-btn {
                width: 44px;
                height: 44px;
            }
            .slogan {
                bottom: 28px;
                left: 24px;
                right: 24px;
            }
            .menu-panel {
                width: 280px;
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
<div class="hero">
    <!-- Изображение прижато к левому верхнему углу -->
    <img class="hero-image" src="images/main.png" alt="GPL Diagnostics background">

    <!-- БУРГЕР -->
    <div class="burger">
        <div class="burger-btn" id="burgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="menu-panel" id="menuPanel">
        <button class="close-menu" id="closeMenuBtn">✕</button>
        <div style="margin-top: 32px;"></div>

        <!-- Mission -->
        <div class="menu-section">
            <div class="main-cat">Mission</div>
            <a href="about.html" class="simple-link" style="margin-left: 18px;">About GPL →</a>
        </div>

        <!-- Products + подкатегории -->
        <div class="menu-section">
            <div class="main-cat">Products</div>
            <ul class="sub-list">
                <li><a href="sub.html">Substances</a></li>
                <li><a href="ab.html">Antibodies</a></li>
                <li><a href="ag.html">Antigens</a></li>
            </ul>
        </div>

        <!-- Services + подкатегории -->
        <div class="menu-section">
            <div class="main-cat">Services</div>
            <ul class="sub-list">
                <li><a href="serv.html">IVD Market Survey</a></li>
                <li><a href="opt.html">IVD Web Optimisation</a></li>
                <li><a href="soft.html">IVD Software Development</a></li>
            </ul>
        </div>

        <!-- Contacts -->
        <div class="menu-section">
            <div class="main-cat">Contacts</div>
            <a href="contacts.html" class="simple-link" style="margin-left: 18px;">Get in touch →</a>
        </div>
    </div>

    <!-- СЛОГАН -->
    <div class="slogan">
        <h1>Trace the unknown.<br>Make the invisible visible.</h1>
    </div>
</div>

<script>
    (function() {
        const burgerBtn = document.getElementById('burgerBtn');
        const menuPanel = document.getElementById('menuPanel');
        const closeBtn = document.getElementById('closeMenuBtn');

        function openMenu() {
            menuPanel.classList.add('open');
        }
        function closeMenu() {
            menuPanel.classList.remove('open');
        }

        if (burgerBtn) {
            burgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openMenu();
            });
        }
        if (closeBtn) {
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeMenu();
            });
        }

        document.addEventListener('click', function(event) {
            if (menuPanel && menuPanel.classList.contains('open')) {
                const isClickInsideMenu = menuPanel.contains(event.target);
                const isClickOnBurger = burgerBtn && burgerBtn.contains(event.target);
                if (!isClickInsideMenu && !isClickOnBurger) {
                    closeMenu();
                }
            }
        });

        if (menuPanel) {
            menuPanel.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }
    })();
</script>
</body>
</html>
