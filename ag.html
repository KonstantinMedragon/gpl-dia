            let currentTooltip = null;
            
            function closeTooltip() {
                if (currentTooltip) { currentTooltip.remove(); currentTooltip = null; }
            }
            
            function attachClickHandler() {
                document.querySelectorAll('.product-name').forEach(cell => {
                    if (cell._clickHandler) cell.removeEventListener('click', cell._clickHandler);
                    const handler = (e) => {
                        e.stopPropagation();
                        const desc = cell.getAttribute('data-desc');
                        if (!desc) return;
                        const abbrevCell = cell.closest('tr').querySelector('.abbrev-cell');
                        if (!abbrevCell) return;
                        if (currentTooltip && currentTooltip.parentNode === abbrevCell) { closeTooltip(); return; }
                        closeTooltip();
                        const tooltip = document.createElement('div');
                        tooltip.className = 'tooltip-overlay';
                        tooltip.innerText = desc;
                        abbrevCell.style.position = 'relative';
                        abbrevCell.appendChild(tooltip);
                        currentTooltip = tooltip;
                    };
                    cell.addEventListener('click', handler);
                    cell._clickHandler = handler;
                });
            }
            
            function renderTable(searchTerm = "") {
                const term = searchTerm.trim().toLowerCase();
                const filterFn = (item) => item.catalog.toLowerCase().includes(term) || item.name.toLowerCase().includes(term) || item.full.toLowerCase().includes(term);
                let filteredEuk = eukaryoticAntigens;
                let filteredProk = prokaryoticAntigens;
                if (term) {
                    filteredEuk = eukaryoticAntigens.filter(filterFn);
                    filteredProk = prokaryoticAntigens.filter(filterFn);
                }
                const container = document.getElementById('tablesContainer');
                if (!container) return;
                let html = "";
                
                // Эукариотическая группа
                if (filteredEuk.length) {
                    html += `<div class="antigens-section"><div class="category-title">Eukaryotic cell expressed antigens</div><div class="result-count">Found: ${filteredEuk.length}</div>`;
                    html += `<div class="table-wrapper"><table class="antigens-table"><thead><tr><th>Catalog #</th><th>Abbreviation</th><th>Full name / description</th></tr></thead><tbody>`;
                    filteredEuk.forEach(item => {
                        html += `<tr><td>${escapeHtml(item.catalog)}</td><td class="abbrev-cell">${escapeHtml(item.name)}</td><td class="product-name" data-desc="${escapeAttr(item.desc)}">${escapeHtml(item.full)}</td></tr>`;
                    });
                    html += `</tbody></table></div></div>`;
                } else if (term) { html += `<div class="no-results">No eukaryotic antigens match your search.</div>`; }
                
                // Прокариотическая группа
                if (filteredProk.length) {
                    html += `<div class="antigens-section"><div class="category-title">Prokaryotic cell expressed antigens</div><div class="result-count">Found: ${filteredProk.length}</div>`;
                    html += `<div class="table-wrapper"><table class="antigens-table"><thead><tr><th>Catalog #</th><th>Abbreviation</th><th>Full name / description</th></tr></thead><tbody>`;
                    filteredProk.forEach(item => {
                        html += `<tr><td>${escapeHtml(item.catalog)}</td><td class="abbrev-cell">${escapeHtml(item.name)}</td><td class="product-name" data-desc="${escapeAttr(item.desc)}">${escapeHtml(item.full)}</td></tr>`;
                    });
                    html += `</tbody></table></div></div>`;
                } else if (term && filteredEuk.length === 0) { html = `<div class="no-results">No antigens match your search.</div>`; }
                
                container.innerHTML = html;
                attachClickHandler();
            }
            
            function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
            function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
            
            document.body.addEventListener('click', (e) => { if (currentTooltip && !e.target.closest('.product-name')) closeTooltip(); });
            
            const searchInput = document.getElementById('searchInput'), clearBtn = document.getElementById('clearSearch');
            if (searchInput) {
                searchInput.addEventListener('input', () => { renderTable(searchInput.value); if (clearBtn) clearBtn.style.display = searchInput.value ? 'block' : 'none'; });
            }
            if (clearBtn) {
                clearBtn.addEventListener('click', () => { searchInput.value = ''; renderTable(''); clearBtn.style.display = 'none'; });
            }
            renderTable('');
            
            // Бургер
            const burgerBtn = document.getElementById('burgerBtn'), menuPanel = document.getElementById('menuPanel'), closeMenuBtn = document.getElementById('closeMenuBtn');
            if(burgerBtn) burgerBtn.addEventListener('click', () => menuPanel.classList.add('open'));
            if(closeMenuBtn) closeMenuBtn.addEventListener('click', () => menuPanel.classList.remove('open'));
            document.addEventListener('click', (e) => { if(menuPanel && menuPanel.classList.contains('open') && !menuPanel.contains(e.target) && !burgerBtn.contains(e.target)) menuPanel.classList.remove('open'); });
            
            // Форма
            const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxA5MueC0RXAhrR5oR74pDP3iM5CrNIPr_vtYydxyqm5mgz-RRuGEHgmVHRxphBW40rvA/exec';
            const modal = document.getElementById('contactModal'), inquireBtn = document.getElementById('inquireBtnAg'), closeModalBtn = document.getElementById('closeModalBtn'), form = document.getElementById('contactForm'), statusDiv = document.getElementById('formStatus');
            function openModal() { modal.style.display = 'flex'; statusDiv.innerHTML = ''; }
            function closeModalFunc() { modal.style.display = 'none'; form.reset(); statusDiv.innerHTML = ''; }
            if(inquireBtn) inquireBtn.addEventListener('click', openModal);
            if(closeModalBtn) closeModalBtn.addEventListener('click', closeModalFunc);
            window.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });
            if(form) form.addEventListener('submit', async (e) => {
                e.preventDefault();
                let name = document.getElementById('name').value.trim(), company = document.getElementById('company').value.trim(), email = document.getElementById('email').value.trim(), message = document.getElementById('message').value.trim();
                if (!name || !company || !email || !message) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Please fill in all fields.</span>'; return; }
                if (!email.includes('@')) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Invalid email.</span>'; return; }
                const submitBtn = form.querySelector('.modal-submit');
                submitBtn.disabled = true; submitBtn.textContent = 'Sending...'; statusDiv.innerHTML = 'Sending...';
                try { await fetch(PROXY_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, company, email, message }) });
                    statusDiv.innerHTML = '<span style="color:#2e7d32;">✓ Thank you! We will get back to you soon.</span>'; form.reset(); setTimeout(closeModalFunc, 2000);
                } catch(err) { statusDiv.innerHTML = '<span style="color:#d32f2f;">Error, please try again later.</span>'; }
                finally { submitBtn.disabled = false; submitBtn.textContent = 'Send inquiry'; }
            });
        })();
    </script>
</body>
</html>
